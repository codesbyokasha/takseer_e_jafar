<!doctype html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>تکسیر جفر</title>
  <!-- Google Urdu Font -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: "Noto Nastaliq Urdu", "Noto Naskh Arabic", "Segoe UI", sans-serif; 
      background:#f9f9f9; 
      text-align:center; 
      padding:20px; 
      margin:0;
    }
    h1 { 
      font-size:clamp(18px, 5vw, 24px); 
      margin-bottom:15px;
    }
    textarea { 
      width:100%; 
      max-width:500px; 
      height:60px; 
      font-size:clamp(16px, 4vw, 20px); 
      direction:rtl; 
      margin-bottom:10px; 
      padding:8px; 
      box-sizing:border-box; 
      font-family: "Noto Nastaliq Urdu", "Noto Naskh Arabic", sans-serif;
    }
    .modes { 
      margin:10px auto; 
      display:flex; 
      justify-content:center; 
      flex-wrap:wrap; 
      gap:10px; 
      font-size:clamp(14px, 4vw, 18px);
    }
    button { 
      padding:10px 18px; 
      margin:5px; 
      font-size:clamp(14px, 4vw, 18px); 
      cursor:pointer; 
      border:none; 
      border-radius:6px; 
      background:#444; 
      color:#fff; 
      flex:1 1 120px; 
      font-family:inherit;
    }
    button:hover { 
      background:#666; 
    }
    .output { 
      margin-top:20px; 
      text-align:center; 
      padding:10px; 
      max-width:100%; 
    }
    .line {
      border:1px solid #ccc;
      border-radius:6px;
      padding:6px;
      margin:6px 0;
      font-size:clamp(16px, 4vw, 22px);
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#fff;
    }
    .line span {
      flex:1;
      text-align:center;
    }
    .num {
      background:#444;
      color:#fff;
      padding:2px 8px;
      border-radius:4px;
      font-size:14px;
      margin-left:8px;
      min-width:28px;
    }
  </style>
</head>
<body>
  <h1>تکسیر جفر</h1>
  <textarea id="name" placeholder="عبارت درج کریں"></textarea>
  <div class="modes">
    <label><input type="radio" name="mode" value="sadar-muakhar" checked> صدر موخر</label>
    <label><input type="radio" name="mode" value="muakhar-sadar"> موخر صدر</label>
  </div>
  <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:500px;margin:auto;">
    <button id="generate">نتیجہ دکھائیں</button>
    <button id="clear">صاف کریں</button>
  </div>
  <div id="output" class="output"></div>

  <script>
    // Remove airaab (Arabic diacritics)
    function removeAiraab(str) {
      return str.replace(/[\u064B-\u0652\u0670\u0653-\u0655]/g, "");
    }

    function splitChars(str){
      return Array.from(str.replace(/\s+/g, ''));
    }

    function takseerSadarMuakhar(chars){
      const res = [];
      let i=0, j=chars.length-1;
      let takeFromStart = true;
      while(i<=j){
        if(takeFromStart){ res.push(chars[i]); i++; }
        else { res.push(chars[j]); j--; }
        takeFromStart = !takeFromStart;
      }
      return res;
    }

    function takseerMuakharSadar(chars){
      const res = [];
      let i=0, j=chars.length-1;
      let takeFromEnd = true;
      while(i<=j){
        if(takeFromEnd){ res.push(chars[j]); j--; }
        else { res.push(chars[i]); i++; }
        takeFromEnd = !takeFromEnd;
      }
      return res;
    }

    document.getElementById('generate').onclick = () => {
      let text = document.getElementById('name').value.trim();
      const output = document.getElementById('output');
      output.innerHTML = '';

      if(!text){ output.textContent = 'براہ کرم نام درج کریں'; return; }

      // Remove airaab before processing
      text = removeAiraab(text);

      const chars = splitChars(text);
      const mode = document.querySelector('input[name="mode"]:checked').value;

      let current = chars;
      let count = 1;

      function addLine(arr){
        const div = document.createElement('div');
        div.className = 'line';
        div.innerHTML = `<span>${arr.join(' ')}</span><div class="num">${count}</div>`;
        output.appendChild(div);
        count++;
      }

      addLine(chars);
      do {
        current = (mode==='sadar-muakhar') ? takseerSadarMuakhar(current) : takseerMuakharSadar(current);
        addLine(current);
      } while(current.join('') !== chars.join(''));
    };

    document.getElementById('clear').onclick = () => {
      document.getElementById('name').value='';
      document.getElementById('output').textContent='';
    };
  </script>
</body>
</html>
